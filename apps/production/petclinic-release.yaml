apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: petclinic
  namespace: production

spec:
  interval: 5m

  chart:
    spec:
      chart: charts/petclinic

      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

  values:
    replicaCount: 2

    ingress:
      host: petclinic.production.local

    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"

      limits:
        memory: "1Gi"
        cpu: "500m"