apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: petclinic
  namespace: staging

spec:
  interval: 5m

  chart:
    spec:
      chart: charts/petclinic

      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system

  values:
    replicaCount: 1

    ingress:
      host: petclinic.staging.local