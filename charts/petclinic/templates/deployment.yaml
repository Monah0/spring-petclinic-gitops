apiVersion: apps/v1
kind: Deployment

metadata:
  name: petclinic

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: petclinic

  template:
    metadata:
      labels:
        app: petclinic

    spec:
      containers:
        - name: petclinic

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres

            - name: POSTGRES_URL
              value: jdbc:postgresql://petclinic-db-rw.staging.svc.cluster.local:5432/petclinic

            - name: POSTGRES_USER
              value: petclinic

            - name: POSTGRES_PASS
              value: petclinicpassword

          resources:
{{ toYaml .Values.resources | indent 12 }}