apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: petclinic

  annotations:
    cert-manager.io/cluster-issuer: selfsigned

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - {{ .Values.ingress.host }}

      secretName: petclinic-tls

  rules:
    - host: {{ .Values.ingress.host }}

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: petclinic

                port:
                  number: 80