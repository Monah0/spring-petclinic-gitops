apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: petclinic

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingress.host }}

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: petclinic

                port:
                  number: 80